<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELFIN - Тезкор Брон</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --red: #ff4757; --green: #2ed573; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: url('https://media-cdn.tripadvisor.com/media/photo-s/2c/01/33/e5/cliff-house-hotel.jpg') no-repeat center center fixed;
            background-size: cover; color: white; text-align: center;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 20, 40, 0.7); z-index: 0; }
        .content { position: relative; z-index: 1; padding: 20px; max-width: 1000px; margin: auto; }

        h1 { font-size: clamp(2rem, 10vw, 3.5rem); margin-bottom: 5px; }
        .hint { font-size: 1rem; opacity: 0.8; margin-bottom: 25px; color: #00d2ff; }

        #msg-box { height: 30px; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; text-shadow: 0 0 10px #000; }

        /* КАРТОЧКАЛАРНИ ТУГМА ҚИЛАМИЗ */
        .status-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; margin-bottom: 30px; 
        }

        .room-btn { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 20px; border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .room-btn:hover { transform: translateY(-5px); border-color: white; }

        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto 10px; }
        
        /* Бўш (Яшил) */
        .free { border-color: rgba(46, 213, 115, 0.3); }
        .free .status-dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .free .status-txt { color: var(--green); font-weight: bold; }

        /* Банд (Қизил) */
        .busy { border-color: var(--red); background: rgba(255, 71, 87, 0.15); }
        .busy .status-dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .busy .status-txt { color: var(--red); font-weight: bold; }

        /* ПАСТКИ ТУГМАЛАР */
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .btn { 
            padding: 12px 25px; border-radius: 8px; border: 1px solid white; 
            background: rgba(0,0,0,0.5); color: white; text-decoration: none; font-size: 0.9rem;
        }

        @media (min-width: 768px) { .status-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1>DELFIN</h1>
        <p class="hint">Брон қилиш учун бўш саунани танланг</p>
        <div id="msg-box"></div>

        <div id="status-container" class="status-grid">
            </div>

        <div class="nav">
            <a href="menu.html" class="btn">ТАОМЛАР МЕНЮСИ</a>
            <a href="admin.html" class="btn">ШАХСИЙ КАБИНЕТ</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
            databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentData = {};

        // Базани реал вақтда кузатиш
        db.ref('rooms/').on('value', (snapshot) => {
            currentData = snapshot.val();
            const container = document.getElementById('status-container');
            container.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const id = 's' + i;
                const room = currentData && currentData[id] ? currentData[id] : { name: i + '-Сауна', status: 'БЎШ' };
                const isBusy = room.status === 'БАНД';
                const sClass = isBusy ? 'busy' : 'free';

                container.innerHTML += `
                    <div class="room-btn ${sClass}" onclick="handleRoomClick(${i}, '${room.status}')">
                        <div class="status-dot"></div>
                        <div style="margin-bottom: 5px;">${room.name}</div>
                        <div class="status-txt">${room.status}</div>
                    </div>`;
            }
        });

        // Карточка босилганда ишлайдиган функция
       function handleRoomClick(num, status) {
    if (status === 'БАНД') {
        alert(num + "-сауна ҳозир банд!");
    } else {
        // Тўғри файл номини ёзинг
        window.location.href = "zakazsauna.html?sauna=" + num;
    }
}
    </script>
</body>
</html>
