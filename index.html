<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELFIN - Тезкор Брон</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="//taplink.cc/id:12742677/widget/" async></script>
    <style>
        :root { --red: #ff4757; --green: #2ed573; }
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif;
           background-image: url(delf.png);
           background-size: cover;
            background-size: cover; color: white; text-align: center;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 20, 40, 0.7); z-index: 0; }
        .content { position: relative; z-index: 1; padding: 20px; max-width: 1200px; margin: auto; }
        h1 { font-size: clamp(2.5rem, 10vw, 4rem); margin-bottom: 5px; font-weight: 800; letter-spacing: 2px; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        /* Карточка стили */
        .room-btn { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 20px 15px; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; min-height: 200px;
        }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; margin: 0 auto 15px; }
        .free .status-dot { background: var(--green); box-shadow: 0 0 15px var(--green); }
        .free .status-txt { color: var(--green); font-weight: bold; }
        .busy .status-dot { background: var(--red); box-shadow: 0 0 15px var(--red); }
        .busy .status-txt { color: var(--red); font-weight: bold; }
        
        /* БАНД САНАЛАР УЧУН СТИЛЬ */
        .booked-dates {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85rem;
            color: #ff9f43; /* Сариқ-олов ранг, саналар ажралиб туриши учун */
        }
        .date-badge {
            display: block;
            background: rgba(231, 76, 60, 0.3); /* Қизил шаффоф */
            border: 1px solid var(--red);
            color: white;
            padding: 2px 5px;
            margin: 3px 0;
            border-radius: 5px;
            font-weight: 600;
        }

        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .btn { padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.6); color: white; text-decoration: none; font-weight: 600; }
        @media (min-width: 1024px) { .status-grid { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1>DELFIN SAUNA</h1>
        <div id="status-container" class="status-grid"></div>
        <div class="nav">
            <a href="menu.html" class="btn">ТАОМЛАР МЕНЮСИ</a>
            <a href="massage.html" class="btn">Мануал терапия</a>
            <a href="admin.html" class="btn">ШАХСИЙ КАБИНЕТ</a>
        </div>
    </div>
    <div class="quar">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3011.2692740536613!2d71.6154183!3d40.99747910000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38bb4bb383625abb%3A0xee95dae72b028d2!2z0KHQsNGD0L3QsCDQlNCV0JvQpNCY0J0!5e0!3m2!1sru!2s!4v1782409106424!5m2!1sru!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div> 
    <script>
        
        const firebaseConfig = {
            apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
            databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Маълумотларни ўқиш
        db.ref('rooms/').on('value', (snapshot) => {
            const currentData = snapshot.val();
            const container = document.getElementById('status-container');
            container.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const id = 's' + i;
                const room = (currentData && currentData[id]) ? currentData[id] : { name: i + '-Сауна', status: 'БЎШ' };
                const sClass = (room.status === 'БАНД') ? 'busy' : 'free';
                
                // Админ киритган саналарни олиш (массив сифатида)
                let datesHtml = '';
                if (room.bookedDates) {
                    datesHtml = '<div class="booked-dates"><b>Банд кунлар:</b>';
                    Object.values(room.bookedDates).forEach(date => {
                        datesHtml += `<span class="date-badge">${date}</span>`;
                    });
                    datesHtml += '</div>';
                }

                container.innerHTML += `
                    <div class="room-btn ${sClass}" onclick="handleRoomClick(${i}, '${room.status}')">
                        <div class="status-dot"></div>
                        <div style="font-size: 1.1rem; margin-bottom: 8px; font-weight: 600;">${room.name}</div>
                        <div class="status-txt">${room.status}</div>
                        ${datesHtml}
                    </div>`;
            }
        });

        function handleRoomClick(num, status) {
            if (status === 'БАНД') { 
                alert("Бу сауна ҳозир банд! Пастки саналардаги банд кунларни текширинг."); 
            } else { 
                window.location.href = "zakazsauna.html?sauna=" + num; 
            }
        }
    </script>
</body>
</html>
