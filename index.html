 <!DOCTYPE html>
<html lang="uz">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delfin Matrix - Ишлайдиган Тизим</title>
    <link rel="shortcut icon" href="icon.jpg" type="image/x-icon">
    
    <style>
        body { 
            margin: 0; padding: 0; overflow-x: hidden;
            background: #000; font-family: 'Courier New', monospace;
            color: #00ff41; text-align: center;
        }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* ТЕПА МЕНЮ - ХОДИМЛАР УЧУН */
        .staff-access { 
            background: rgba(0, 40, 0, 0.95); padding: 15px 5px; 
            border-bottom: 2px solid #00ff41;
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
        }
        .staff-link { 
            color: #fff; text-decoration: none; border: 1px solid #fff; 
            padding: 8px 12px; font-size: 14px; font-weight: bold; border-radius: 4px;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        /* НАВИГАЦИЯ */
        nav { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
            padding: 20px 10px; background: rgba(0, 0, 0, 0.9); position: sticky; top: 0; z-index: 1000;
            border-bottom: 3px solid #00ff41;
        }
        
        nav a, .dropbtn { 
            color: #00ff41; text-decoration: none; font-weight: bold; 
            padding: 15px 20px; font-size: 18px; 
            border: 2px solid #00ff41; background: rgba(0, 255, 65, 0.1);
            text-transform: uppercase; border-radius: 8px; cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        nav a:hover, .dropbtn:hover { box-shadow: 0 0 20px #00ff41; background: rgba(0, 255, 65, 0.2); }

        /* ДУШЛАР МЕНЮСИ */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; background-color: #000; min-width: 220px;
            border: 2px solid #00ff41; z-index: 1001; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 20px #00ff41;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content button { 
            width: 100%; color: #00ff41; padding: 15px; background: none;
            border: none; border-bottom: 1px solid #00ff41; font-size: 18px; cursor: pointer;
        }
        .dropdown-content button:hover { background: #00ff41; color: #000; }

        /* КАРТОЧКАЛАР КОНТЕЙНЕРИ (СЕТКА) */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; 
        }

        /* КАРТОЧКАЛАР ВА ЭФФЕКТЛАР */
        .card { 
            background: rgba(0, 15, 0, 0.9); 
            border: 2px solid #00ff41; 
            padding: 30px; 
            border-radius: 10px;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); 
        }
        .card:hover { 
            box-shadow: 0 0 30px #00ff41; 
            transform: translateY(-8px);
        }

        /* ТУГМАЛАР НЕОН */
        .btn { 
            width: 100%; 
            padding: 18px; 
            background: transparent; 
            border: 2px solid #00ff41; 
            color: #00ff41; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
        }
        .btn:hover { 
            background: #00ff41; 
            color: #000; 
            box-shadow: 0 0 25px #00ff41; 
        }

        .section-title { color: #fff; margin: 40px 0 20px; letter-spacing: 3px; font-size: 28px; text-transform: uppercase; text-shadow: 0 0 10px #00ff41; }
        .price { font-size: 26px; color: #fff; margin: 15px 0; font-weight: bold; }

        /* ТЎЛОВ ОЙНАСИ */
        #payment-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #000; padding: 30px; border: 3px solid #00ff41; z-index: 10000; width: 85%; max-width: 350px;
            box-shadow: 0 0 50px #00ff41;
        }
        input { width: 100%; padding: 15px; margin: 20px 0; background: #000; border: 2px solid #00ff41; color: #00ff41; text-align: center; font-size: 22px; box-sizing: border-box; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="staff-access">
    <a href="kabinet.html" class="staff-link" style="color:#00ff41; border-color:#00ff41; font-size: 18px;">[ ШАХСИЙ КАБИНЕТ ]</a>
</div>

<nav>
    <a href="index.html">АСОСИЙ</a>
    <div class="dropdown">
        <button class="dropbtn">ДУШЛАР (6) ▼</button>
        <div class="dropdown-content">
            <button onclick="openOrder('1-Душ хонаси', 20000)">1-ДУШ</button>
            <button onclick="openOrder('2-Душ хонаси', 20000)">2-ДУШ</button>
            <button onclick="openOrder('3-Душ хонаси', 20000)">3-ДУШ</button>
            <button onclick="openOrder('4-Душ хонаси', 20000)">4-ДУШ</button>
            <button onclick="openOrder('5-Душ хонаси', 20000)">5-ДУШ</button>
            <button onclick="openOrder('6-Душ хонаси', 20000)">6-ДУШ</button>
        </div>
    </div>
    <a href="menu.html">МЕНЮ</a>
</nav>

<h2 class="section-title">САУНАЛАР (5 ТА)</h2>
<div class="container">
    <div class="card"><h3>1-САУНА 4 кишигача </h3><p class="price">160,000 сўм</p><button class="btn" onclick="openOrder('1-Сауна', 50000)">ТАНЛАШ</button></div>
    <div class="card"><h3>2-САУНА 4 кишигача</h3><p class="price">160,000 сўм</p><button class="btn" onclick="openOrder('2-Сауна', 50000)">ТАНЛАШ</button></div>
    <div class="card"><h3>3-САУНА 7 кишигача </h3><p class="price">250,000 сўм</p><button class="btn" onclick="openOrder('3-Сауна', 80000)">ТАНЛАШ</button></div>
    <div class="card"><h3>4-САУНА 8 кишигача</h3><p class="price">400,000 сўм</p><button class="btn" onclick="openOrder('4-Сауна', 80000)">ТАНЛАШ</button></div>
    <div class="card"><h3>5-VIP САУНА 8 кишигача</h3><p class="price">400,000 сўм</p><button class="btn" onclick="openOrder('5-VIP Сауна', 120000)">ТАНЛАШ</button></div>
</div>

<h2 class="section-title">МАССАЖ</h2>
<div class="container">
    
    <div class="card"><h3>МАССАЖ ХОНАСИ (СТАНДАРТ 20 ДАҚИҚА)</h3>
        <p class="price">50,000 сўм</p><button class="btn" onclick="openOrder('Массаж хизмати', 50000)">ТАНЛАШ</button>
    </div>
</div>

<div id="payment-modal">
    <h2 id="modal-title" style="margin-top:0;">ТЎЛОВ</h2>
    <p id="modal-price" style="font-size:20px; color:#fff;"></p>
    <input type="number" id="user-phone" placeholder="901234567">
    <button class="btn" style="background:#00ff41; color:#000;" onclick="confirmOrder()">ТАСДИҚЛАШ</button>
    <button class="btn" style="border:none; margin-top:10px;" onclick="closeModal()">БЕКОР ҚИЛИШ</button>
</div>

<script>
    // МАТРИЦА ФОНИ
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "01";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41"; ctx.font = fontSize + "px arial";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 40);

    // ТЎЛОВ ЛОГИКАСИ
    function openOrder(name, price) {
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-price').innerText = price.toLocaleString() + " сўм";
        document.getElementById('payment-modal').style.display = 'block';
    }
    function closeModal() { document.getElementById('payment-modal').style.display = 'none'; }
    function confirmOrder() {
        if(document.getElementById('user-phone').value.length < 7) {
            alert("Телефон рақамини киритинг!"); return;
        }
        alert("Буюртма қабул қилинди!");
        window.location.href = "https://payme.uz";
    }
</script>
</body>
</html>
