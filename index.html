<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauna Delphine - Брон қилиш</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .glass-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .orange-glow { box-shadow: 0 0 25px rgba(234, 88, 12, 0.15); }
        input:focus { border-color: #ea580c !important; box-shadow: 0 0 10px rgba(234, 88, 12, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-[#010409]">

    <div class="glass-card p-8 w-full max-w-md orange-glow border-t-4 border-orange-600">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-orange-600/10 rounded-full mx-auto flex items-center justify-center mb-4 border border-orange-500/20">
                <i class="fas fa-hot-tub text-4xl text-orange-500"></i>
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tight text-white">SAUNA <span class="text-orange-500">DELPHINE</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Онлайн брон қилиш маркази</p>
        </div>

        <form id="sauna-form" class="space-y-4">
            <div>
                <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block font-bold">Исмингиз</label>
                <input type="text" id="name" placeholder="Закиров Зохиджон" required 
                    class="w-full bg-[#0d1117] border border-[#30363d] rounded-xl p-4 text-sm outline-none text-white transition-all">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block font-bold">Телефон рақам</label>
                <input type="tel" id="phone" value="+998" required 
                    class="w-full bg-[#0d1117] border border-[#30363d] rounded-xl p-4 text-sm outline-none text-white transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block font-bold">Кун ва вақт</label>
                    <input type="datetime-local" id="time" required 
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-xl p-3 text-xs outline-none text-white transition-all">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block font-bold">Киши сони</label>
                    <input type="number" id="people" placeholder="7" required 
                        class="w-full bg-[#0d1117] border border-[#30363d] rounded-xl p-3 text-sm outline-none text-white transition-all">
                </div>
            </div>

            <button type="button" id="submit-btn" onclick="sendOrder()" 
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl text-xs uppercase transition shadow-lg active:scale-95 mt-4 tracking-widest">
                Буюртмани тасдиқлаш
            </button>
        </form>

        <div id="status" class="hidden mt-6 p-4 rounded-xl text-center text-[11px] font-bold uppercase tracking-wider"></div>
        
        <div class="mt-8 text-center border-t border-[#30363d] pt-6">
            <p class="text-[9px] text-gray-600 uppercase">Администратор билан алоқа:</p>
            <p class="text-sm text-orange-500 font-bold mt-1">+998 93 150 60 46</p>
        </div>
    </div>

    <script>
        // --- СОЗЛАМАЛАР ---
        const BOT_TOKEN = "8762282587:AAGvuGSQ0rDYReCdVdhgF8e4v6-PX7d5xiw"; 
        const ADMIN_ID = "-1001273563663"; 

        function sendOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const time = document.getElementById('time').value;
            const people = document.getElementById('people').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('submit-btn');

            if(name.length < 2 || phone.length < 9 || !time || !people) {
                alert("Илтимос, барча маълумотларни тўлдиринг!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ЮБОРИЛМОҚДА...";

            const message = `♨️ *ЯНГИ САУНА БУЮРТМАСИ!*\n\n` +
                            `👤 *Мижоз:* ${name}\n` +
                            `📞 *Тел:* ${phone}\n` +
                            `📅 *Вақт:* ${time.replace('T', ' ')}\n` +
                            `👥 *Одам сони:* ${people} киши\n\n` +
                            `🌐 _Delphine Booking System_`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            fetch(url)
                .then(res => {
                    if(res.ok) {
                        status.innerText = "РАҲМАТ! БУЮРТМА КАНАЛГА ЮБОРИЛДИ.";
                        status.className = "mt-6 p-4 rounded-xl text-center text-[11px] font-bold uppercase bg-green-500/10 text-green-500 block border border-green-500/20";
                        document.getElementById('sauna-form').reset();
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    status.innerText = "ХАТОЛИК! БОТ КАНАЛДА АДМИНМИ ЁКИ ТОКЕН ХАТО?";
                    status.className = "mt-6 p-4 rounded-xl text-center text-[11px] font-bold uppercase bg-red-500/10 text-red-500 block border border-red-500/20";
                })
                .finally(() => {
                    status.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Буюртмани тасдиқлаш";
                });
        }
    </script>
</body>
</html>
