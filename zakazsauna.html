<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAUNA DELPHINE - Брон қилиш</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .order-card { background: #1a1a1a; border: 1px solid #ff6600; border-radius: 20px; padding: 25px; max-width: 450px; margin: auto; }
        .selector-label { margin: 15px 0 10px; display: block; color: #aaa; font-size: 0.9rem; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .s-btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .s-btn.busy { background: #444; color: #888; cursor: not-allowed; border: 1px solid red; }
        .s-btn.free { background: #222; color: #2ed573; border: 1px solid #2ed573; }
        .s-btn.selected { background: #ff6600; color: white; transform: scale(1.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .confirm-btn { width: 100%; padding: 15px; background: #ff6600; border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="order-card">
        <h2>SAUNA <span style="color:#ff6600">DELPHINE</span></h2>
        <p style="font-size: 0.8rem; color: #888;">ОНЛАЙН БРОН ҚИЛИШ МАРКАЗИ</p>
        
        <label class="selector-label">САУНАНИ ТАНЛАНГ:</label>
        <div id="sauna-btns" class="btn-grid"></div>

        <input type="text" placeholder="ИСМИНГИЗ" id="u-name">
        <input type="text" placeholder="ТЕЛЕФОН РАҚАМ" id="u-phone">
        <div style="display: flex; gap: 10px;">
            <input type="datetime-local" id="u-time">
            <input type="number" placeholder="КИШИ СОНИ" id="u-count">
        </div>

        <button class="confirm-btn" onclick="sendOrder()">БУЮРТМАНИ ТАСДИҚЛАШ</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
            databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedSauna = null;

        // Firebase-дан статус олиш
        db.ref('rooms/').on('value', (snapshot) => {
            const rooms = snapshot.val();
            const container = document.getElementById('sauna-btns');
            container.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const id = 's' + i;
                const status = (rooms && rooms[id]) ? rooms[id].status : 'БЎШ';
                const isBusy = (status === 'БАНД');

                const btn = document.createElement('button');
                btn.className = 's-btn ' + (isBusy ? 'busy' : 'free');
                if (selectedSauna == i) btn.classList.add('selected');                                
                btn.innerText = i + (isBusy ? " БАНД" : " БЎШ");
                btn.disabled = isBusy;
                btn.onclick = () => {
                    selectedSauna = i;
                    document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                container.appendChild(btn);
            }
        });

        // Телеграмга юбориш функцияси
        function sendOrder() {
            if (!selectedSauna) { alert("Илтимос, саунани танланг!"); return; }
            const name = document.getElementById('u-name').value;
            const phone = document.getElementById('u-phone').value;
            const time = document.getElementById('u-time').value;
            const count = document.getElementById('u-count').value;

            if (!name || !phone) { alert("Исм ва телефонни киритинг!"); return; }

            // ⚠️ БУ ЕРГА ЎЗИНГИЗНИНГ БОТ МАЪЛУМОТЛАРИНИ ҚЎЙИНГ
            const botToken = "712345678:AAH..."; // Сизнинг токен
            const chatId = "123456789";         // Сизнинг ID

            const text = `🚀 **ЯНГИ БУЮРТМА!**\n\n` +
                         `🏢 Сауна: ${selectedSauna}-хона\n` +
                         `👤 Мижоз: ${name}\n` +
                         `📞 Тел: ${phone}\n` +
                         `⏰ Вақт: ${time}\n` +
                         `👥 Киши: ${count}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
            })
            .then(res => {
                if(res.ok) {
                    alert("Раҳмат, " + name + "! Буюртма админга юборилди.");
                    location.reload(); // Саҳифани янгилаш
                } else {
                    alert("Хато! Бот токени ёки Chat ID-ни текширинг.");
                }
            })
            .catch(err => alert("Интернетигизни текширинг!"));
        }
    </script>
</body>
</html>
