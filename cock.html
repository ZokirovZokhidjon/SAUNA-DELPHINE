<!DOCTYPE html>
<html lang="uz">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Delfin - Ошпаз Панели</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .exit-btn { background: #ff0000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        .input-panel {
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0, 255, 65, 0.05);
        }

        input { 
            background: #000; border: 1px solid #00ff41; color: #fff; 
            padding: 12px; border-radius: 5px; font-family: 'Courier New'; font-size: 18px;
            outline: none; flex: 1 1 120px;
        }
        input::placeholder { color: #fff; opacity: 0.8; }
        #saunaNum { color: #fff900; border-color: #fff900; }
        #saunaNum::placeholder { color: #fff900; }

        .add-btn { 
            background: #00ff41; color: #000; border: none; padding: 12px 25px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;
            width: 100%; margin-top: 5px;
        }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #00ff41; min-width: 600px; }
        th { border: 1px solid #00ff41; padding: 12px; background: rgba(0, 255, 65, 0.1); font-size: 14px; }
        td { border: 1px solid #00ff41; padding: 12px; text-align: center; font-size: 16px; }
        
        .food-text { color: #fff; font-weight: bold; font-size: 18px; }
        .ready-btn { background: #00ff41; color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .del-btn { background: #ff0000; color: #fff; border: none; padding: 8px 10px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-left: 5px; }

        .total-box {
            border: 1px dashed #00ff41;
            margin-top: 15px;
            padding: 15px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
        }

        /* ОҚ ТУГМА МАЙДОНИ */
        #report-area {
            display: none; 
            text-align: center; 
            margin-top: 30px; 
            padding: 20px; 
            border: 2px solid white;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
        }
        .excel-btn {
            background: white; color: black; padding: 15px 30px; 
            font-weight: bold; border-radius: 8px; cursor: pointer; 
            font-size: 18px; border: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 18px;">ДЕЛЬФИН: ОШПАЗ</h2>
        <button class="exit-btn" onclick="location.href='kabinet.html'">ЧИҚИШ</button>
    </div>

    <div class="input-panel">
        <input type="number" id="roomNum" placeholder="Жой №">
        <input type="number" id="saunaNum" placeholder="Сауна">
        <input type="text" id="foodItem" placeholder="Таом номи" style="flex: 2 1 200px;">
        <input type="number" id="price" placeholder="Сумма">
        <button class="add-btn" onclick="addNewOrder()">БУЮРТМА ҚЎШИШ +</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Жой/S</th>
                    <th>Буюртма</th>
                    <th>Сумма</th>
                    <th>Сана/Вақт</th>
                    <th>Ҳаракат</th>
                </tr>
            </thead>
            <tbody id="kitchen-list"></tbody>
        </table>
    </div>

    <div class="total-box">
        ЖАМИ: <span id="total-sum">0</span> сўм
    </div>

    <div id="report-area">
        <p style="color: white; margin-bottom: 15px;">⚠️ ИШ ВАҚТИ ТУГАДИ. КУНЛИК ҲИСОБОТНИ ТАЙЁРЛАШ:</p>
        <button class="excel-btn" onclick="exportToExcel()">📄 ЭКСЕЛГА САҚЛАШ (ФИКСАЦИЯ)</button>
    </div>

    <script>
        function addNewOrder() {
            const n = document.getElementById('roomNum').value;
            const sNum = document.getElementById('saunaNum').value;
            const f = document.getElementById('foodItem').value;
            const s = document.getElementById('price').value;

            if(!n || !f || !s) return alert("Маълумотни тўлиқ киритинг!");

            const hozir = new Date();
            const sana = hozir.toLocaleDateString('uz-UZ');
            const soat = hozir.toLocaleTimeString('uz-UZ').slice(0, 5);

            const newOrder = {
                id: Date.now(),
                place: n + "-ЖОЙ" + (sNum ? " / S-" + sNum : ""), 
                foodName: f,
                sum: Number(s),
                cat: 'ОШХОНА',
                status: 'new',
                time: sana + " " + soat
            };

            let db = JSON.parse(localStorage.getItem('delfin_db') || "[]");
            db.push(newOrder);
            localStorage.setItem('delfin_db', JSON.stringify(db));

            document.getElementById('roomNum').value = "";
            document.getElementById('saunaNum').value = "";
            document.getElementById('foodItem').value = "";
            document.getElementById('price').value = "";
            
            showOrders();
        }

        function showOrders() {
            const list = document.getElementById('kitchen-list');
            const totalDisplay = document.getElementById('total-sum');
            let db = JSON.parse(localStorage.getItem('delfin_db') || "[]");
            
            const active = db.filter(i => i.status === 'new' && i.cat === 'ОШХОНА');

            let total = 0;
            list.innerHTML = active.map(order => {
                total += Number(order.sum);
                return `
                    <tr>
                        <td>${order.place}</td>
                        <td class="food-text">${order.foodName}</td>
                        <td>${Number(order.sum).toLocaleString()}</td>
                        <td style="font-size: 12px;">${order.time}</td>
                        <td>
                            <button class="ready-btn" onclick="finishOrder(${order.id})">✅</button>
                            <button class="del-btn" onclick="deleteOrder(${order.id})">❌</button>
                        </td>
                    </tr>
                `;
            }).join('');

            totalDisplay.innerText = total.toLocaleString();
            checkReportTime(); // Вақтни текшириш
        }

        function finishOrder(id) {
            let db = JSON.parse(localStorage.getItem('delfin_db') || "[]");
            db = db.map(i => { if(i.id === id) i.status = 'done'; return i; });
            localStorage.setItem('delfin_db', JSON.stringify(db));
            showOrders();
        }

        function deleteOrder(id) {
            if(confirm("Ўчирилсинми?")) {
                let db = JSON.parse(localStorage.getItem('delfin_db') || "[]");
                db = db.filter(i => i.id !== id);
                localStorage.setItem('delfin_db', JSON.stringify(db));
                showOrders();
            }
        }

        // ЭКСЕЛГА ЮКЛАШ ФУНКЦИЯСИ
        function exportToExcel() {
            let db = JSON.parse(localStorage.getItem('delfin_db') || "[]");
            if (db.length === 0) return alert("Маълумот йўқ!");

            let csv = "\uFEFFSana va Vaqt,Joy/Sauna,Buyurtma,Summa\n";
            db.forEach(i => {
                csv += `${i.time},${i.place},${i.foodName},${i.sum}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Delfin_Xisobot_${new Date().toLocaleDateString()}.csv`;
            link.click();

            if(confirm("Ҳисобот сақланди. Базани янги кун учун тозалаймизми?")) {
                localStorage.removeItem('delfin_db');
                location.reload();
            }
        }

        // ВАҚТНИ ТЕКШИРИШ (Масалан, соат 20:00 дан кейин тугма чиқади)
        function checkReportTime() {
            const h = new Date().getHours();
            if(h >= 20 || h <= 4) { // Соат 20:00 дан эрталабки 04:00 гача тугма кўринади
                document.getElementById('report-area').style.display = 'block';
            }
        }

        showOrders();
        setInterval(showOrders, 5000);
    </script>
</body>
</html>
