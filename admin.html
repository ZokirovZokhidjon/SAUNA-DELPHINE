<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAUNA DELFIN - Admin</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
            authDomain: "adminsaunadelfin.firebaseapp.com",
            projectId: "adminsaunadelfin",
            storageBucket: "adminsaunadelfin.firebasestorage.app",
            messagingSenderId: "731782199513",
            appId: "1:731782199513:web:d79ce8f5b181def4e4e6c8",
            databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.toggleRoom = function(id, name) {
            const btn = document.getElementById(id);
            const newState = btn.classList.contains('free') ? 'БАНД' : 'БЎШ';
            set(ref(db, 'rooms/' + id), { name: name, status: newState });
        };

        onValue(ref(db, 'rooms/'), (snapshot) => {
            const data = snapshot.val();
            for (let id in data) {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.innerText = `${data[id].name}: ${data[id].status}`;
                    btn.className = 'room-btn ' + (data[id].status === 'БАНД' ? 'busy' : 'free');
                }
            }
        });
    </script>
    <style>
        body { background: #1a1a1a; color: #f4d03f; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #2c1a10; padding: 20px; border: 2px solid #f4d03f; border-radius: 15px; }
        .room-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .free { background: #27ae60; color: white; }
        .busy { background: #c0392b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DELFIN ADMIN</h1>
        <button id="s1" class="room-btn free" onclick="toggleRoom('s1', '1-Сауна')">1-Сауна: БЎШ</button>
        <button id="s2" class="room-btn free" onclick="toggleRoom('s2', '2-Сауна')">2-Сауна: БЎШ</button>
        <button id="s3" class="room-btn free" onclick="toggleRoom('s3', '3-Сауна')">3-Сауна: БЎШ</button>
    </div>
</body>
</html>
