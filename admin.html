<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELFIN ADMIN - Secure Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --dark: #0b0b0b; --card: #1a1a1a; --red: #ff4757; --green: #2ed573; --blue: #3498db; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 90%; max-width: 350px; }
        .admin-container { width: 100%; max-width: 1000px; display: none; margin: auto; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .settings-bar { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; border-left: 5px solid var(--gold); }
        select { background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 10px; font-size: 1rem; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .room-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; text-align: center; position: relative; }
        .kitchen-card { border-color: var(--blue) !important; }
        .room-num { font-size: 1.4rem; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; }
        .status-busy { background: rgba(255, 71, 87, 0.15); color: var(--red); border: 1px solid var(--red); }
        .status-free { background: rgba(46, 213, 115, 0.15); color: var(--green); border: 1px solid var(--green); }
        .timer-box { font-size: 2.2rem; font-family: monospace; color: var(--gold); margin: 10px 0; }
        .kitchen-card .timer-box { visibility: hidden; }
        .action-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-busy { background: var(--red); color: white; }
        .btn-free { background: var(--green); color: white; }
        input { width: 100%; padding: 14px; margin: 15px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-overlay" class="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--gold);">АДМИН КИРИШ</h2>
        <input type="password" id="admin-pass" placeholder="Паролни киритинг" autocomplete="off">
        <button class="action-btn btn-free" onclick="checkUnlock()">КИРИШ</button>
    </div>
</div>

<div id="admin-main" class="admin-container">
    <div class="header-box">
        <h1 style="color: var(--gold); margin: 0;">DELFIN CONTROL</h1>
        <button class="logout-btn" onclick="location.reload()">ЧИҚИШ</button>
    </div>

    <div class="settings-bar">
        <span>⏰ САУНА ВАҚТИ:</span>
        <select id="duration">
            <option value="60">1 соат</option>
            <option value="90">1:30 соат</option>
            <option value="120">2 соат</option>
            <option value="150">2:30 соат</option>
            <option value="180">3 соат</option>
            <option value="210">3:30 соат</option>
        </select>
    </div>

    <div id="rooms-list" class="rooms-grid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABO4zuo6GnSNWld4y0H91VI1QSgQewtRU",
        databaseURL: "https://adminsaunadelfin-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkUnlock() {
        const passField = document.getElementById('admin-pass');
        if(passField.value === "1234") { 
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('admin-main').style.display = 'block';
            passField.value = ""; // Паролни хотирадан ўчириш
        } else { 
            alert("Парол хато!"); 
            passField.value = ""; // Хато бўлса ҳам ўчириш
        }
    }

    db.ref('rooms/').on('value', (snapshot) => {
        const data = snapshot.val();
        const grid = document.getElementById('rooms-list');
        grid.innerHTML = '';

        for (let i = 1; i <= 8; i++) {
            const id = 's' + i;
            const isKitchen = i > 5;
            const roomName = isKitchen ? (i-5) + "-ОШХОНА" : i + "-САУНА";
            const room = data && data[id] ? data[id] : { status: 'БЎШ' };
            const isBusy = room.status === 'БАНД';

            const card = document.createElement('div');
            card.className = `room-card ${isKitchen ? 'kitchen-card' : ''}`;

            card.innerHTML = `
                <div class="room-num">${roomName}</div>
                <div class="status-badge ${isBusy ? 'status-busy' : 'status-free'}">${room.status}</div>
                <div id="timer-${i}" class="timer-box">00:00:00</div>
                <button class="action-btn ${isBusy ? 'btn-busy' : 'btn-free'}" onclick="updateStatus(${i}, '${room.status}')">
                    ${isBusy ? 'ОЧИШ' : 'БАНД ҚИЛИШ'}
                </button>
            `;
            grid.appendChild(card);
        }
    });

    function updateStatus(num, current) {
        const id = 's' + num;
        if(current === 'БАНД') {
            db.ref('rooms/' + id).update({ status: 'БЎШ', until: null });
        } else {
            if (num > 5) {
                db.ref('rooms/' + id).update({ status: 'БАНД', until: null });
            } else {
                const mins = parseFloat(document.getElementById('duration').value);
                db.ref('rooms/' + id).update({ status: 'БАНД', until: Date.now() + (mins * 60000) });
            }
        }
    }

    setInterval(() => {
        const now = Date.now();
        db.ref('rooms/').once('value', (s) => {
            const d = s.val();
            if(!d) return;
            for(let i=1; i<=5; i++) {
                const r = d['s'+i];
                const el = document.getElementById('timer-'+i);
                if(r && r.status === 'БАНД' && r.until) {
                    const diff = r.until - now;
                    if(diff > 0) {
                        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                        if(el) el.innerText = `${h}:${m}:${s}`;
                    } else { db.ref('rooms/s'+i).update({status:'БЎШ', until:null}); }
                } else { if(el) el.innerText = "00:00:00"; }
            }
        });
    }, 1000);
</script>
</body>
</html>
