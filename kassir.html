<!DOCTYPE html>
<html lang="uz">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Delfin - Кассир Панели (Сауна/Душ)</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .exit-btn { background: #ff0000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        .input-panel {
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0, 255, 65, 0.05);
        }

        input, select { 
            background: #000; border: 1px solid #00ff41; color: #fff; 
            padding: 12px; border-radius: 5px; font-family: 'Courier New'; font-size: 18px;
            outline: none; flex: 1 1 150px;
        }

        #saunaNum { color: #fff900; border-color: #fff900; }
        input::placeholder { color: rgba(255,255,255,0.6); }

        .add-btn { 
            background: #00ff41; color: #000; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase;
            width: 100%; font-size: 16px;
        }

        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; border: 1px solid #00ff41; min-width: 650px; }
        th { border: 1px solid #00ff41; padding: 12px; background: rgba(0, 255, 65, 0.1); font-size: 14px; }
        td { border: 1px solid #00ff41; padding: 10px; text-align: center; font-size: 16px; }
        
        .time-col { font-size: 12px; color: #fff; white-space: nowrap; }
        .sum-col { font-weight: bold; color: #fff900; }

        .total-box {
            border: 1px dashed #00ff41;
            margin-top: 15px;
            padding: 15px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
        }

        /* ЭКСЕЛЬ УЧУН ОҚ ТУГМА */
        #report-area {
            display: block; /* Доим кўриниб туриши ёки вақтга қараб созлаш мумкин */
            text-align: center; 
            margin-top: 25px; 
            padding: 20px; 
            border: 2px solid white;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .excel-btn {
            background: white; color: black; padding: 15px 30px; 
            font-weight: bold; border-radius: 8px; cursor: pointer; 
            font-size: 16px; border: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 18px;">ДЕЛЬФИН: КАССИР (САУНА)</h2>
        <button class="exit-btn" onclick="location.href='kabinet.html'">ЧИҚИШ</button>
    </div>

    <div class="input-panel">
        <input type="number" id="saunaNum" placeholder="Сауна №">
        <select id="serviceType">
            <option value="САУНА">САУНА</option>
            <option value="ДУШ">ДУШ</option>
            <option value="БОШҚА">БОШҚА</option>
        </select>
        <input type="number" id="price" placeholder="Тўлов суммаси">
        <button class="add-btn" onclick="addNewOrder()">ХИСОБГА ҚЎШИШ ВА ФИКСАЦИЯ ✅</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Сауна №</th>
                    <th>Хизмат тури</th>
                    <th>Сумма</th>
                    <th>Тўлиқ сана ва вақт</th>
                    <th>Ҳаракат</th>
                </tr>
            </thead>
            <tbody id="cashier-list"></tbody>
        </table>
    </div>

    <div class="total-box">
        ЖАМИ ТУШУМ: <span id="total-sum">0</span> сўм
    </div>

    <div id="report-area">
        <p style="color: white; margin-bottom: 15px;">📊 КУНЛИК ИШ ЯКУНИДА ҲИСОБОТНИ ЮКЛАБ ОЛИНГ:</p>
        <button class="excel-btn" onclick="exportToExcel()">📄 ЭКСЕЛГА САҚЛАШ (CSV)</button>
    </div>

    <script>
        function addNewOrder() {
            const sNum = document.getElementById('saunaNum').value;
            const type = document.getElementById('serviceType').value;
            const price = document.getElementById('price').value;

            if(!sNum || !price) return alert("Маълумотни тўлиқ киритинг!");

            const hozir = new Date();
            // Тўлиқ сана ва вақт формати: 24.03.2026 16:30
            const vaqt = hozir.toLocaleDateString('uz-UZ') + " " + hozir.toLocaleTimeString('uz-UZ').slice(0, 5);

            const newEntry = {
                id: Date.now(),
                sauna: sNum + "-САУНА",
                service: type,
                sum: Number(price),
                time: vaqt,
                status: 'paid'
            };

            let db = JSON.parse(localStorage.getItem('delfin_kassa_db') || "[]");
            db.push(newEntry);
            localStorage.setItem('delfin_kassa_db', JSON.stringify(db));

            document.getElementById('saunaNum').value = "";
            document.getElementById('price').value = "";
            
            showOrders();
        }

        function showOrders() {
            const list = document.getElementById('cashier-list');
            const totalDisplay = document.getElementById('total-sum');
            let db = JSON.parse(localStorage.getItem('delfin_kassa_db') || "[]");
            
            let total = 0;
            list.innerHTML = db.map(item => {
                total += Number(item.sum);
                return `
                    <tr>
                        <td style="color:#fff900; font-weight:bold;">${item.sauna}</td>
                        <td>${item.service}</td>
                        <td class="sum-col">${item.sum.toLocaleString()} сўм</td>
                        <td class="time-col">${item.time}</td>
                        <td>
                            <button class="exit-btn" style="padding:5px 10px; font-size:12px;" onclick="deleteEntry(${item.id})">ЎЧИРИШ</button>
                        </td>
                    </tr>
                `;
            }).reverse().join(''); // Янгилари тепада чиқади

            totalDisplay.innerText = total.toLocaleString();
        }

        function deleteEntry(id) {
            if(confirm("Ўчирилсинми?")) {
                let db = JSON.parse(localStorage.getItem('delfin_kassa_db') || "[]");
                db = db.filter(i => i.id !== id);
                localStorage.setItem('delfin_kassa_db', JSON.stringify(db));
                showOrders();
            }
        }

        function exportToExcel() {
            let db = JSON.parse(localStorage.getItem('delfin_kassa_db') || "[]");
            if (db.length === 0) return alert("Ҳисобот учун маълумот йўқ!");

            // CSV формати (Excel учун)
            let csv = "\uFEFFSana va Vaqt,Sauna №,Xizmat turi,Summa\n";
            db.forEach(i => {
                csv += `${i.time},${i.sauna},${i.service},${i.sum}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Delfin_Kassa_${new Date().toLocaleDateString()}.csv`;
            link.click();

            if(confirm("Ҳисобот сақланди. Янги иш куни учун базани тозалаймизми?")) {
                localStorage.removeItem('delfin_kassa_db');
                location.reload();
            }
        }

        // Саҳифа юкланганда маълумотларни чиқариш
        showOrders();
    </script>
</body>
</html>
